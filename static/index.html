<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsroom</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: { colors: {
  paper: '#F6F7F9', ink: '#101828', sub: '#667085', line: '#E4E7EC',
  brand: '#D92D20',
  red1: '#FEF3F2', red6: '#D92D20', red8: '#912018',
  amber1: '#FFFAEB', amber6: '#DC6803', amber8: '#7A3707',
  green1: '#ECFDF3', green6: '#079455', green8: '#085D3A',
  blue1: '#EFF8FF', blue6: '#1570EF', blue8: '#194185',
}}}}
</script>
<style>
  body { background: #F6F7F9; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #D0D5DD; border-radius: 4px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .fade-up { animation: fadeUp .35s ease-out; }
  @keyframes flashIn { from { transform: translateY(-100%); } to { transform: none; } }
  #flash-strip { animation: flashIn .3s ease-out; }
  @keyframes flashPulse { 0%,100% { opacity: 1; } 50% { opacity: .75; } }
  #flash-badge { animation: flashPulse 1.2s infinite; }
  .tab-active { background: #101828; color: #fff; }
  .chip-active { background: #101828; color: #fff; border-color: #101828; }
</style>
</head>
<body class="text-ink text-[15px] min-h-screen">

<!-- Flash strip: breaking / viral acceleration alerts -->
<div id="flash-strip" class="hidden fixed top-0 inset-x-0 z-40 cursor-pointer" onclick="Flash.jump()">
  <div id="flash-inner" class="flex items-center gap-3 px-4 py-2.5 text-white text-[14px] font-medium shadow-lg">
    <span id="flash-badge" class="px-2 py-0.5 rounded font-bold text-[11px] tracking-widest bg-white/20"></span>
    <span id="flash-title" class="truncate"></span>
    <button onclick="event.stopPropagation();Flash.hide()" class="ml-auto text-white/70 hover:text-white px-1">✕</button>
  </div>
</div>

<header class="sticky top-0 z-20 bg-white border-b border-line">
  <div class="max-w-6xl mx-auto px-4 py-2.5 flex items-center gap-3 flex-wrap">
    <div class="flex items-center gap-2 mr-1">
      <span class="w-2.5 h-2.5 rounded-full bg-brand"></span>
      <span class="font-semibold tracking-tight">Newsroom</span>
    </div>
    <nav class="flex gap-1 overflow-x-auto">
      <button data-tab="stories" class="tab tab-active px-3.5 py-1.5 rounded-full text-[13px] font-medium whitespace-nowrap">Story desk</button>
      <button data-tab="xdesk" class="tab px-3.5 py-1.5 rounded-full text-[13px] font-medium text-sub whitespace-nowrap hover:bg-paper">X desk</button>
      <button data-tab="ops" class="tab px-3.5 py-1.5 rounded-full text-[13px] font-medium text-sub whitespace-nowrap hover:bg-paper">Ops</button>
    </nav>
    <span id="updated" class="ml-auto text-[12px] text-sub whitespace-nowrap">connecting…</span>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-5">

  <!-- Story desk -->
  <section id="page-stories">
    <div class="flex items-center gap-2 flex-wrap mb-4">
      <h1 class="text-[17px] font-semibold mr-1">Top stories right now</h1>
      <button id="refresh-stories" class="flex items-center gap-1.5 text-[13px] font-medium px-3.5 py-1.5 rounded-full bg-white border border-line hover:border-ink transition-colors">
        <span id="refresh-icon">⟳</span> Refresh stories
      </button>
      <div id="filters" class="flex gap-1.5 flex-wrap ml-auto"></div>
    </div>
    <div id="board-mix" class="hidden md:flex items-center gap-4 bg-white border border-line rounded-xl px-4 py-2.5 mb-4"></div>
    <div id="story-list" class="space-y-2.5">
      <p class="text-sub text-[14px] py-8 text-center">Loading stories…</p>
    </div>
  </section>

  <!-- X desk -->
  <section id="page-xdesk" class="hidden">
    <div class="flex items-center gap-3 flex-wrap mb-4">
      <h1 class="text-[17px] font-semibold">Live from monitored handles</h1>
      <button id="x-refresh-btn" class="flex items-center gap-1.5 text-[13px] font-medium px-3.5 py-1.5 rounded-full bg-white border border-line hover:border-ink transition-colors">𝕏 Refresh tweets</button>
      <span id="x-budget" class="text-[12px] text-sub"></span>
      <span id="x-note" class="text-[12px] text-sub ml-auto"></span>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
      <div>
        <p class="text-[11px] font-semibold tracking-wide text-green8 uppercase mb-2">Government &amp; wires</p>
        <div id="col-A" class="space-y-2 md:max-h-[70vh] md:overflow-y-auto md:pr-1"></div>
      </div>
      <div>
        <p class="text-[11px] font-semibold tracking-wide text-amber8 uppercase mb-2">Rival channels</p>
        <div id="col-B" class="space-y-2 md:max-h-[70vh] md:overflow-y-auto md:pr-1"></div>
      </div>
      <div>
        <p class="text-[11px] font-semibold tracking-wide text-blue8 uppercase mb-2">Field reporters</p>
        <div id="col-C" class="space-y-2 md:max-h-[70vh] md:overflow-y-auto md:pr-1"></div>
      </div>
    </div>
  </section>

  <!-- Ops -->
  <section id="page-ops" class="hidden">
    <h1 class="text-[17px] font-semibold mb-4">Operations</h1>
    <div id="ops-metrics" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5"></div>

    <div class="bg-white border border-line rounded-xl p-4 mb-4">
      <p class="text-[13px] font-semibold mb-3">Controls</p>
      <div class="flex items-center gap-3 flex-wrap text-[13px]">
        <label class="flex items-center gap-2">Auto-refresh stories
          <select id="news-interval" class="border border-line rounded-lg px-2 py-1 bg-white">
            <option value="0">Hourly only</option>
            <option value="5">Every 5 min</option>
            <option value="10">Every 10 min</option>
            <option value="30">Every 30 min</option>
          </select>
        </label>
        <button onclick="Ops.ingestNow(this)" class="px-3 py-1.5 rounded-full border border-line bg-white hover:border-ink">⟳ Re-rank now</button>
        <button onclick="XDesk.refresh()" class="px-3 py-1.5 rounded-full border border-line bg-white hover:border-ink">𝕏 Refresh tweets</button>
        <button onclick="Ops.briefNow(this)" class="px-3 py-1.5 rounded-full border border-line bg-white hover:border-ink">✉ Email brief now</button>
        <a href="/api/briefings/latest" target="_blank" class="px-3 py-1.5 rounded-full border border-line bg-white hover:border-ink">View latest brief</a>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="bg-white border border-line rounded-xl p-4">
        <p class="text-[13px] font-semibold mb-2">Last story refresh</p>
        <div id="ops-lastcycle" class="text-[13px] text-sub space-y-1"></div>
      </div>
      <div class="bg-white border border-line rounded-xl p-4">
        <p class="text-[13px] font-semibold mb-2">Guardrails — recently filtered posts</p>
        <div id="ops-discarded" class="text-[13px] text-sub space-y-2"></div>
      </div>
    </div>
  </section>
</main>

<!-- Story pack modal -->
<div id="pack-overlay" class="hidden fixed inset-0 z-30 bg-ink/40 p-3 md:p-8 overflow-y-auto" onclick="if(event.target===this)StoryDesk.closePack()">
  <div class="max-w-2xl mx-auto bg-white rounded-2xl border border-line p-5 md:p-6 fade-up" id="pack-content"></div>
</div>

<script src="/static/js/app.js"></script>
<script src="/static/js/story_desk.js"></script>
<script src="/static/js/x_desk.js"></script>
<script src="/static/js/ops.js"></script>
<script src="/static/js/stream.js"></script>
</body>
</html>
